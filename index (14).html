<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapTheHistory</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;overflow:hidden;width:100vw;height:100vh;font-family:'Segoe UI',Arial,sans-serif;color:#c9d1d9}
canvas{position:absolute;top:0;left:0}
/* HEADER */
#hdr{position:absolute;top:0;left:0;right:0;z-index:10;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(13,17,23,.97) 70%,transparent)}
#logo{font-size:18px;letter-spacing:4px;color:#e8b84b;text-transform:uppercase;font-weight:300}
#logo b{color:#f0d060;font-weight:600}
#tag{font-size:9px;color:#3a4050;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
#ls{background:rgba(13,17,23,.9);border:1px solid #30363d;color:#8b949e;padding:5px 9px;font-size:11px;cursor:pointer;outline:none;border-radius:4px}
/* LEFT PANEL */
#lp{position:absolute;top:56px;left:16px;z-index:10;width:215px;display:flex;flex-direction:column;gap:7px}
.box{background:rgba(10,14,22,.93);border:1px solid #1e2535;border-radius:6px;padding:10px 12px}
.bl{display:block;font-size:9px;color:#e8b84b;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;font-weight:600}
.box input{width:100%;background:rgba(255,255,255,.04);border:1px solid #1e2535;color:#c9d1d9;padding:6px 8px;font-size:12px;border-radius:4px;outline:none}
.box input:focus{border-color:#e8b84b}
.box input::placeholder{color:#2e3850}
#sr{max-height:145px;overflow-y:auto;margin-top:6px;display:none}
.si{padding:6px 8px;font-size:11px;color:#8b949e;cursor:pointer;border-radius:3px;border-bottom:1px solid #0d1117}
.si:hover{background:rgba(232,184,75,.08);color:#e8b84b}
.si strong{color:#e6edf3;display:block;font-size:12px}
.sb{display:inline-block;font-size:9px;padding:1px 5px;border-radius:8px;margin-right:4px;font-weight:500}
.yr{display:flex;gap:6px;align-items:center}
.yr input{flex:1;text-align:center}
.yr span{color:#2e3850;font-size:11px}
#ya{width:100%;margin-top:6px;background:rgba(232,184,75,.12);border:1px solid rgba(232,184,75,.3);color:#e8b84b;padding:6px;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:4px;font-weight:600}
#ya:hover{background:rgba(232,184,75,.2)}
.fb{display:flex;align-items:center;gap:7px;padding:4px 5px;cursor:pointer;font-size:11px;border-radius:4px;color:#3a4560;transition:all .15s;user-select:none}
.fb:hover{background:rgba(255,255,255,.03)}
.fb.on{color:#8b949e}
.fd{width:8px;height:8px;border-radius:50%;flex-shrink:0;opacity:.4}
.fb.on .fd{opacity:1}
.fc{margin-left:auto;font-size:10px;color:#2e3850}
/* YEAR PANEL */
#yp{position:absolute;right:18px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:8px}
#yd{font-size:30px;color:#e8b84b;letter-spacing:2px;min-width:85px;text-align:center;font-weight:300}
#ye{font-size:9px;color:#2e3850;letter-spacing:2px;text-transform:uppercase;text-align:center;min-height:13px}
#ys{-webkit-appearance:none;appearance:none;writing-mode:vertical-lr;direction:rtl;width:3px;height:300px;background:rgba(30,37,53,.9);border-radius:2px;outline:none;cursor:pointer}
#ys::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#e8b84b;cursor:pointer;box-shadow:0 0 8px rgba(232,184,75,.5)}
.yt{font-size:9px;color:#1e2535}
#ec{position:absolute;top:56px;right:56px;z-index:10;font-size:10px;color:#2e3850;text-align:right}
#ec span{color:#e8b84b}
/* EVENT PANEL */
#ep{position:absolute;right:0;top:0;bottom:0;z-index:10;width:340px;background:rgba(10,14,22,.97);border-left:1px solid #1e2535;display:none;flex-direction:column;overflow:hidden}
#ep.show{display:flex}
#ecl{position:absolute;top:12px;right:12px;z-index:5;color:#484f58;cursor:pointer;font-size:16px;background:rgba(16,22,36,.95);border:1px solid #1e2535;border-radius:4px;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
#ecl:hover{color:#e8b84b;border-color:rgba(232,184,75,.4)}
#ewi{width:100%;height:175px;object-fit:cover;display:none;flex-shrink:0}
#epb{padding:18px 20px;overflow-y:auto;flex:1}
#epb::-webkit-scrollbar{width:3px}
#epb::-webkit-scrollbar-thumb{background:#1e2535}
#etop{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.el{display:inline-flex;align-items:center;gap:4px;font-size:11px;text-decoration:none;padding:6px 12px;border-radius:4px;font-weight:600;transition:all .15s}
.ew{background:#4a3210;color:#f0b84a;border:1px solid #7a5418}.ew:hover{background:#6a4812}
.ey{background:#4a1614;color:#f85149;border:1px solid #7a2220}.ey:hover{background:#6a2018}
.em{background:#0e1f3e;color:#388bfd;border:1px solid #1a3470}.em:hover{background:#162c58}
#ecat{display:inline-block;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:2px 9px;border-radius:10px;margin-bottom:10px}
#eyr{font-size:11px;letter-spacing:2px;color:#e8b84b;margin-bottom:5px;text-transform:uppercase;font-weight:500}
#ett{font-size:20px;color:#e6edf3;line-height:1.3;margin-bottom:5px;font-weight:500}
#eco{font-size:10px;color:#388bfd;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
#ede{font-size:13px;color:#8b949e;line-height:1.9;margin-bottom:12px}
#ewx{font-size:12px;color:#6e7681;line-height:1.75;padding:10px 12px;background:rgba(255,255,255,.02);border-radius:4px;border-left:2px solid rgba(232,184,75,.3);display:none}
.cw{background:rgba(248,81,73,.15);color:#f85149;border:1px solid rgba(248,81,73,.3)}
.cp{background:rgba(56,139,253,.15);color:#388bfd;border:1px solid rgba(56,139,253,.3)}
.cs{background:rgba(63,185,80,.15);color:#3fb950;border:1px solid rgba(63,185,80,.3)}
.cc{background:rgba(210,153,34,.15);color:#d2933a;border:1px solid rgba(210,153,34,.3)}
.cd{background:rgba(255,123,0,.15);color:#ff7b00;border:1px solid rgba(255,123,0,.3)}
.ce{background:rgba(188,140,228,.15);color:#bc8ce4;border:1px solid rgba(188,140,228,.3)}
.ck{background:rgba(41,174,218,.15);color:#29aedb;border:1px solid rgba(41,174,218,.3)}
/* ADD PANEL */
#ab{position:absolute;bottom:18px;left:240px;z-index:10;background:rgba(10,14,22,.9);border:1px solid #1e2535;color:#8b949e;padding:7px 13px;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:4px}
#ab:hover{border-color:#e8b84b;color:#e8b84b}
#ap{position:absolute;bottom:55px;left:240px;z-index:10;width:262px;background:rgba(10,14,22,.97);border:1px solid #1e2535;border-radius:6px;padding:14px;display:none}
#ap.show{display:block}
#ap h3{font-size:10px;letter-spacing:1.5px;color:#e8b84b;text-transform:uppercase;margin-bottom:11px;font-weight:600}
.fg{margin-bottom:7px}
.fg label{display:block;font-size:9px;color:#484f58;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;background:rgba(255,255,255,.03);border:1px solid #1e2535;color:#c9d1d9;padding:5px 8px;font-size:11px;border-radius:4px;outline:none}
.fg input:focus,.fg select:focus{border-color:#e8b84b}
.fg select option{background:#0d1117}
.fg textarea{resize:none;height:50px}
#svb{width:100%;background:rgba(232,184,75,.12);border:1px solid rgba(232,184,75,.3);color:#e8b84b;padding:7px;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:4px;margin-top:2px;font-weight:600}
#svb:hover{background:rgba(232,184,75,.22)}
#apc{position:absolute;top:10px;right:10px;color:#484f58;cursor:pointer;font-size:13px;background:none;border:none}
#sm{font-size:10px;color:#3fb950;text-align:center;margin-top:5px;display:none}
#hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:10;font-size:9px;color:#0e1520;letter-spacing:2px;text-transform:uppercase;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hdr">
  <div><div id="logo"><b>Map</b>TheHistory</div><div id="tag">Interactive Historical Atlas</div></div>
  <select id="ls">
    <option value="en">English</option>
    <option value="zh">中文</option>
    <option value="hi">हिन्दी</option>
    <option value="es">Español</option>
    <option value="ar">العربية</option>
    <option value="tr">Türkçe</option>
    <option value="fr">Français</option>
    <option value="pt">Português</option>
    <option value="ru">Русский</option>
    <option value="de">Deutsch</option>
  </select>
</div>

<div id="lp">
  <div class="box">
    <span class="bl" id="l-search">Search Events &amp; People</span>
    <input type="text" id="se" placeholder="e.g. Napoleon, Battle...">
    <div id="sr"></div>
  </div>
  <div class="box">
    <span class="bl" id="l-year">Year / Year Range</span>
    <div class="yr">
      <input type="number" id="yf" placeholder="From e.g. -480">
      <span>—</span>
      <input type="number" id="yt2" placeholder="To e.g. 1945">
    </div>
    <button id="ya">Apply</button>
  </div>
  <div class="box">
    <span class="bl" id="l-cats">Categories</span>
    <div class="fb on" data-c="war"><span class="fd" style="background:#f85149"></span><span class="cl">War</span><span class="fc" id="fc-war"></span></div>
    <div class="fb on" data-c="politics"><span class="fd" style="background:#388bfd"></span><span class="cl">Politics</span><span class="fc" id="fc-politics"></span></div>
    <div class="fb on" data-c="science"><span class="fd" style="background:#3fb950"></span><span class="cl">Science</span><span class="fc" id="fc-science"></span></div>
    <div class="fb on" data-c="culture"><span class="fd" style="background:#d2933a"></span><span class="cl">Culture</span><span class="fc" id="fc-culture"></span></div>
    <div class="fb on" data-c="disaster"><span class="fd" style="background:#ff7b00"></span><span class="cl">Disaster</span><span class="fc" id="fc-disaster"></span></div>
    <div class="fb on" data-c="exploration"><span class="fd" style="background:#bc8ce4"></span><span class="cl">Exploration</span><span class="fc" id="fc-exploration"></span></div>
    <div class="fb on" data-c="economy"><span class="fd" style="background:#29aedb"></span><span class="cl">Economy</span><span class="fc" id="fc-economy"></span></div>
  </div>
</div>

<div id="yp">
  <div id="yd">1969</div>
  <div id="ye">Cold War Era</div>
  <input type="range" id="ys" min="-3000" max="2024" value="1969" step="1">
  <div class="yt">3000 BC</div>
</div>

<div id="ec"><span id="ecn">0</span> events</div>

<div id="ep">
  <button id="ecl">✕</button>
  <img id="ewi" src="" alt="">
  <div id="epb">
    <div id="etop">
      <a id="ewl" class="el ew" href="#" target="_blank">📖 Wikipedia</a>
      <a id="eyl" class="el ey" href="#" target="_blank">▶ YouTube</a>
      <a id="eml" class="el em" href="#" target="_blank">🗺 Maps</a>
    </div>
    <div id="ecat"></div>
    <div id="eyr"></div>
    <div id="ett"></div>
    <div id="eco"></div>
    <div id="ede"></div>
    <div id="ewx"></div>
  </div>
</div>

<button id="ab">+ Add Event</button>
<div id="ap">
  <button id="apc">✕</button>
  <h3>Add Historical Event</h3>
  <div class="fg"><label>Title</label><input type="text" id="c-title" placeholder="e.g. Battle of Waterloo"></div>
  <div class="fg"><label>Year (negative = BC)</label><input type="number" id="c-year" placeholder="1815 or -480"></div>
  <div class="fg"><label>Country / Region</label><input type="text" id="c-country" placeholder="Belgium"></div>
  <div class="fg"><label>Latitude</label><input type="number" id="c-lat" placeholder="50.68" step="0.01"></div>
  <div class="fg"><label>Longitude</label><input type="number" id="c-lon" placeholder="4.41" step="0.01"></div>
  <div class="fg"><label>Category</label>
    <select id="c-cat">
      <option value="war">War</option><option value="politics">Politics</option>
      <option value="science">Science</option><option value="culture">Culture</option>
      <option value="disaster">Disaster</option><option value="exploration">Exploration</option>
      <option value="economy">Economy</option>
    </select>
  </div>
  <div class="fg"><label>Description</label><textarea id="c-desc" placeholder="Brief description..."></textarea></div>
  <button id="svb">Save Event</button>
  <div id="sm">Saved!</div>
</div>

<div id="hint">drag to rotate · scroll to zoom · click events</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

var uEv=[];try{uEv=JSON.parse(localStorage.getItem('mth_u')||'[]');}catch(e){}
var aCats=new Set(['war','politics','science','culture','disaster','exploration','economy']);
var curY=1969,rf=null,rt=null,WIN=5;

function aEv(){return DB.concat(uEv);}
function era(y){if(y<-2000)return'Prehistoric';if(y<-500)return'Ancient';if(y<500)return'Classical';if(y<1000)return'Early Medieval';if(y<1500)return'Medieval';if(y<1800)return'Early Modern';if(y<1900)return'Industrial Age';if(y<1945)return'Modern';if(y<1991)return'Cold War Era';return'Contemporary';}
function gVis(){
  if(rf!==null&&rt!==null)return aEv().filter(function(e){return e.y>=rf&&e.y<=rt&&aCats.has(e.c);});
  return aEv().filter(function(e){return Math.abs(e.y-curY)<=WIN&&aCats.has(e.c);});
}
function updC(){
  document.getElementById('ecn').textContent=gVis().length;
  ['war','politics','science','culture','disaster','exploration','economy'].forEach(function(c){
    var el=document.getElementById('fc-'+c);
    if(el)el.textContent=aEv().filter(function(e){return e.c===c;}).length;
  });
}

// ── THREE.JS
var renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setClearColor(0x0d1117);

var scene=new THREE.Scene();
var cam=new THREE.PerspectiveCamera(42,window.innerWidth/window.innerHeight,0.1,1000);
cam.position.z=2.2;

scene.add(new THREE.AmbientLight(0x445566,2.5));
var sun=new THREE.DirectionalLight(0xddeeff,1.8);
sun.position.set(4,1.5,3);
scene.add(sun);

// Stars
var sg=new THREE.BufferGeometry();
var sp=[];
for(var i=0;i<6000;i++){
  var t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1),r=80+Math.random()*40;
  sp.push(r*Math.sin(p)*Math.cos(t),r*Math.cos(p),r*Math.sin(p)*Math.sin(t));
}
sg.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.12,transparent:true,opacity:0.6})));

// Globe
var glob=new THREE.Group();
scene.add(glob);
var emat=new THREE.MeshLambertMaterial({color:0x2255aa});
glob.add(new THREE.Mesh(new THREE.SphereGeometry(1,64,64),emat));
glob.add(new THREE.Mesh(new THREE.SphereGeometry(1.036,64,64),
  new THREE.MeshLambertMaterial({color:0x7aadcc,transparent:true,opacity:0.08,side:THREE.FrontSide})));

// Load texture
new THREE.TextureLoader().load(
  'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg',
  function(tex){emat.map=tex;emat.color.set(0xffffff);emat.needsUpdate=true;},
  undefined,
  function(){
    new THREE.TextureLoader().load(
      'https://cdn.jsdelivr.net/npm/three-globe@2.26.4/example/img/earth-blue-marble.jpg',
      function(tex){emat.map=tex;emat.color.set(0xffffff);emat.needsUpdate=true;}
    );
  }
);

// ── MARKERS
function llv(la,lo,r){
  var phi=(90-la)*Math.PI/180,theta=(lo+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));
}
var mkg=new THREE.Group();
glob.add(mkg);
var mks=[];

function buildMk(){
  while(mkg.children.length)mkg.remove(mkg.children[0]);
  mks=[];
  gVis().forEach(function(ev){
    var col=new THREE.Color(CC[ev.c]||'#fff');
    var pos=llv(ev.la,ev.lo,1.012);
    var m=new THREE.Mesh(new THREE.SphereGeometry(0.013,8,8),new THREE.MeshBasicMaterial({color:col}));
    m.position.copy(pos);m.userData=ev;mkg.add(m);mks.push(m);
    var ring=new THREE.Mesh(new THREE.RingGeometry(0.017,0.023,16),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.35,side:THREE.DoubleSide}));
    ring.position.copy(pos);ring.lookAt(new THREE.Vector3(0,0,0));ring.rotateX(Math.PI/2);mkg.add(ring);
  });
  updC();
}
buildMk();

// ── MOUSE / TOUCH
var ray=new THREE.Raycaster(),mou=new THREE.Vector2();
var drag=false,px=0,py=0,trY=0.3,trX=0,rY=0.3,rX=0,autoR=true,zoom=2.2,pt=0;
var cvs=renderer.domElement;

cvs.addEventListener('mousedown',function(e){drag=true;autoR=false;px=e.clientX;py=e.clientY;cvs.style.cursor='grabbing';});
window.addEventListener('mouseup',function(){drag=false;cvs.style.cursor='grab';});
cvs.addEventListener('mousemove',function(e){
  if(drag){
    trY+=(e.clientX-px)*0.004;trX+=(e.clientY-py)*0.004;
    trX=Math.max(-1.4,Math.min(1.4,trX));px=e.clientX;py=e.clientY;
  } else {
    mou.x=(e.clientX/window.innerWidth)*2-1;
    mou.y=-(e.clientY/window.innerHeight)*2+1;
    ray.setFromCamera(mou,cam);
    cvs.style.cursor=ray.intersectObjects(mks).length?'pointer':'grab';
  }
});
cvs.addEventListener('click',function(e){
  mou.x=(e.clientX/window.innerWidth)*2-1;
  mou.y=-(e.clientY/window.innerHeight)*2+1;
  ray.setFromCamera(mou,cam);
  var h=ray.intersectObjects(mks);
  if(h.length)showEv(h[0].object.userData);
});
cvs.addEventListener('wheel',function(e){zoom+=e.deltaY*0.002;zoom=Math.max(1.3,Math.min(5,zoom));},{passive:true});
var lt=null;
cvs.addEventListener('touchstart',function(e){drag=true;autoR=false;lt={x:e.touches[0].clientX,y:e.touches[0].clientY};});
window.addEventListener('touchend',function(){drag=false;});
cvs.addEventListener('touchmove',function(e){
  if(!drag||!lt)return;
  trY+=(e.touches[0].clientX-lt.x)*0.004;trX+=(e.touches[0].clientY-lt.y)*0.004;
  trX=Math.max(-1.4,Math.min(1.4,trX));
  lt={x:e.touches[0].clientX,y:e.touches[0].clientY};
  e.preventDefault();
},{passive:false});

// ── EVENT PANEL
var wc={};
function fetchWiki(t,cb){
  if(!t){cb(null);return;}
  if(wc[t]){cb(wc[t]);return;}
  fetch('https://en.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(t))
    .then(function(r){return r.json();})
    .then(function(d){
      wc[t]={ex:d.extract?d.extract.slice(0,380)+'...':null,th:d.thumbnail?d.thumbnail.source:null};
      cb(wc[t]);
    }).catch(function(){cb(null);});
}

function showEv(ev){
  var wt=ev.w||ev.t.replace(/ /g,'_');
  document.getElementById('ewl').href='https://en.wikipedia.org/wiki/'+wt;
  document.getElementById('eyl').href='https://www.youtube.com/results?search_query='+encodeURIComponent(ev.t+' history');
  document.getElementById('eml').href='https://www.google.com/maps/search/'+encodeURIComponent(ev.t+' '+ev.co);
  document.getElementById('eyr').textContent=ev.y<0?Math.abs(ev.y)+' BC':ev.y+' AD';
  document.getElementById('ett').textContent=ev.t;
  document.getElementById('eco').textContent=ev.co;
  document.getElementById('ede').textContent=ev.d;
  var b=document.getElementById('ecat');
  b.textContent=ev.c.charAt(0).toUpperCase()+ev.c.slice(1);
  b.className=CL[ev.c]||'';
  document.getElementById('ewx').style.display='none';
  document.getElementById('ewi').style.display='none';
  document.getElementById('ep').classList.add('show');
  fetchWiki(ev.w,function(w){
    if(!w)return;
    if(w.th){var wi=document.getElementById('ewi');wi.src=w.th;wi.style.display='block';}
    if(w.ex){var wx=document.getElementById('ewx');wx.textContent=w.ex;wx.style.display='block';}
  });
}
document.getElementById('ecl').addEventListener('click',function(){document.getElementById('ep').classList.remove('show');});

// ── YEAR SLIDER
document.getElementById('ys').addEventListener('input',function(){
  curY=parseInt(this.value);rf=null;rt=null;
  document.getElementById('yf').value='';
  document.getElementById('yt2').value='';
  document.getElementById('yd').textContent=curY<0?Math.abs(curY)+' BC':curY;
  document.getElementById('ye').textContent=era(curY);
  buildMk();
  document.getElementById('ep').classList.remove('show');
});

document.getElementById('ya').addEventListener('click',function(){
  var f=parseInt(document.getElementById('yf').value);
  var t=parseInt(document.getElementById('yt2').value);
  if(!isNaN(f)&&!isNaN(t)){
    rf=Math.min(f,t);rt=Math.max(f,t);
    document.getElementById('yd').textContent=(rf<0?Math.abs(rf)+'BC':rf)+'–'+(rt<0?Math.abs(rt)+'BC':rt);
    document.getElementById('ye').textContent='Range';
  } else if(!isNaN(f)){
    rf=null;rt=null;curY=f;
    document.getElementById('ys').value=f;
    document.getElementById('yd').textContent=f<0?Math.abs(f)+' BC':f;
    document.getElementById('ye').textContent=era(f);
  }
  buildMk();
  document.getElementById('ep').classList.remove('show');
});

document.querySelectorAll('.fb').forEach(function(b){
  b.addEventListener('click',function(){
    var c=b.dataset.c;
    if(aCats.has(c)){aCats.delete(c);b.classList.remove('on');}
    else{aCats.add(c);b.classList.add('on');}
    buildMk();
  });
});

// ── SEARCH
var seEl=document.getElementById('se'),srEl=document.getElementById('sr');
seEl.addEventListener('input',function(){
  var q=seEl.value.trim().toLowerCase();
  if(q.length<2){srEl.style.display='none';return;}
  var hits=aEv().filter(function(e){
    return e.t.toLowerCase().includes(q)||e.co.toLowerCase().includes(q)||e.d.toLowerCase().includes(q);
  }).slice(0,10);
  if(!hits.length){srEl.style.display='none';return;}
  srEl.innerHTML=hits.map(function(ev,i){
    return '<div class="si" data-i="'+i+'"><span class="sb '+CL[ev.c]+'">'+ev.c+'</span><strong>'+ev.t+'</strong>'+(ev.y<0?Math.abs(ev.y)+' BC':ev.y+' AD')+' · '+ev.co+'</div>';
  }).join('');
  srEl.style.display='block';
  srEl.querySelectorAll('.si').forEach(function(el,i){
    el.addEventListener('click',function(){
      var ev=hits[i];
      curY=ev.y;rf=null;rt=null;
      document.getElementById('ys').value=curY;
      document.getElementById('yd').textContent=curY<0?Math.abs(curY)+' BC':curY;
      document.getElementById('ye').textContent=era(curY);
      buildMk();showEv(ev);
      srEl.style.display='none';seEl.value='';
    });
  });
});
document.addEventListener('click',function(e){if(!e.target.closest('.box'))srEl.style.display='none';});

// ── LANGUAGE

  hi:{search:'घटनाएं खोजें',ph:'जैसे नेपोलियन, युद्ध',year:'वर्ष / वर्ष सीमा',from:'से',to:'तक',apply:'लागू करें',cats:'श्रेणियां',add:'+ जोड़ें'},
  es:{search:'Buscar eventos y personas',ph:'ej. Napoleón, Batalla',year:'Año / Rango de años',from:'Desde',to:'Hasta',apply:'Aplicar',cats:'Categorías',add:'+ Agregar evento'},
  ar:{search:'البحث عن الأحداث',ph:'مثل نابليون، معركة',year:'السنة / نطاق السنوات',from:'من',to:'إلى',apply:'تطبيق',cats:'الفئات',add:'+ إضافة حدث'},
  tr:{search:'Olay ve Kişi Ara',ph:'örn. Napolyon, Savaş',year:'Yıl / Yıl Aralığı',from:'Başlangıç',to:'Bitiş',apply:'Uygula',cats:'Kategoriler',add:'+ Olay Ekle'},
  fr:{search:'Rechercher événements',ph:'ex. Napoléon, Bataille',year:"Année / Plage d'années",from:'De',to:'À',apply:'Appliquer',cats:'Catégories',add:'+ Ajouter'},

};
function applyLang(l){
  var L=LABELS[l]||LABELS.en;
  document.body.style.direction=l==='ar'?'rtl':'ltr';
  document.getElementById('l-search').textContent=L.search;
  document.getElementById('se').placeholder=L.ph;
  document.getElementById('l-year').textContent=L.year;
  document.getElementById('yf').placeholder=L.from;
  document.getElementById('yt2').placeholder=L.to;
  document.getElementById('ya').textContent=L.apply;
  document.getElementById('l-cats').textContent=L.cats;
  document.getElementById('ab').textContent=L.add;
}
document.getElementById('ls').addEventListener('change',function(){applyLang(this.value);});

// ── ADD EVENT
document.getElementById('ab').addEventListener('click',function(){document.getElementById('ap').classList.toggle('show');});
document.getElementById('apc').addEventListener('click',function(){document.getElementById('ap').classList.remove('show');});
document.getElementById('svb').addEventListener('click',function(){
  var ti=document.getElementById('c-title').value.trim();
  var yr=parseInt(document.getElementById('c-year').value);
  var co=document.getElementById('c-country').value.trim();
  var la=parseFloat(document.getElementById('c-lat').value);
  var lo=parseFloat(document.getElementById('c-lon').value);
  var ca=document.getElementById('c-cat').value;
  var de=document.getElementById('c-desc').value.trim();
  if(!ti||isNaN(yr)||!co||isNaN(la)||isNaN(lo)||!de){alert('Please fill all fields.');return;}
  uEv.push({y:yr,la:la,lo:lo,t:ti,co:co,d:de,c:ca});
  try{localStorage.setItem('mth_u',JSON.stringify(uEv));}catch(e){}
  document.getElementById('sm').style.display='block';
  setTimeout(function(){document.getElementById('sm').style.display='none';},2500);
  ['c-title','c-year','c-country','c-lat','c-lon','c-desc'].forEach(function(id){document.getElementById(id).value='';});
  buildMk();
});

// ── ANIMATION
function loop(){
  requestAnimationFrame(loop);
  pt+=0.02;
  if(autoR)trY+=0.001;
  rX+=(trX-rX)*0.07;rY+=(trY-rY)*0.07;
  glob.rotation.x=rX;glob.rotation.y=rY;
  cam.position.z+=(zoom-cam.position.z)*0.07;
  for(var i=0;i<mks.length;i++){mks[i].scale.setScalar(1+0.18*Math.sin(pt+i*1.3));}
  renderer.render(scene,cam);
}
loop();

window.addEventListener('resize',function(){
  renderer.setSize(window.innerWidth,window.innerHeight);
  cam.aspect=window.innerWidth/window.innerHeight;
  cam.updateProjectionMatrix();
});
updC();
</script>
